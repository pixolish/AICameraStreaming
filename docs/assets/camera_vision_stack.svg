  <line x1="390" y1="320" x2="390" y2="358" stroke="#534AB7" stroke-width="0.4" opacity="0.25"/>
  <text x="450" y="342" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">BEV</text>
