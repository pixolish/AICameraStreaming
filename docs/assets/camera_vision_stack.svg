  <text x="120" y="94" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">ADAS</text>
  <line x1="195" y1="72" x2="195" y2="110" stroke="#854F0B" stroke-width="0.4" opacity="0.25"/>
