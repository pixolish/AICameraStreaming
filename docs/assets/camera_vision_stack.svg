  <text x="28" y="566" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#aaa">L1</text>

  <!-- Legend -->
  <rect x="40" y="628" width="600" height="42" rx="6" fill="#f8f8f6" stroke="#ddd" stroke-width="0.5"/>
  <rect x="56" y="642" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="74" y="650" dominant-baseline="central" font-size="11" fill="#633806">Application</text>
